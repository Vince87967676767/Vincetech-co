<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincetech - Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif;}
html{scroll-behavior:smooth;}
body{
  background: linear-gradient(135deg,#ffe4e6,#dbeafe,#ffffff);
  color:#111;
  overflow-x:hidden;
  transition: background 0.4s, color 0.4s;
}

/* DARK MODE */
.dark{background:#0f172a;color:#e5e7eb;}
.dark .icon-box{background:rgba(30,41,59,0.6);color:#e5e7eb;}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px 40px;
}
#themeToggle{
  margin-left:auto;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* LOGO */
.glow-logo{
  width:140px;
  animation: glow 3s infinite;
}
@keyframes glow{50%{filter:drop-shadow(0 0 15px #3b82f6);}}

/* ICON GRID */
.icon-wrapper{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:40px;
}
.icon-box{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:30px;
  text-align:center;
  transition:0.4s;
  border:1px solid rgba(255,255,255,0.3);
  text-decoration:none;
  color:inherit;
}
.icon-box:hover{
  transform:translateY(-12px) scale(1.03);
}

/* HERO */
#heroSlider{
  display:flex;
  flex-wrap:wrap;
  padding:60px 40px;
  align-items:center;
  gap:30px;
}

/* GALLERY */
.image-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.gallery-photo{
  position:relative;
  overflow:hidden;
  border-radius:12px;
  width:100%;
}

.gallery-photo img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

/* CAPTION FIX */
.gallery-photo .caption{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
  text-align:center;
  z-index:2;
  pointer-events:auto;
  opacity:1;
}

/* RESPONSIVE FIX */
@media (max-width:768px){
  .image-gallery{
    grid-template-columns:1fr;
  }
}

@media (min-width:769px) and (max-width:1024px){
  .image-gallery{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (min-width:1025px){
  .image-gallery{
    grid-template-columns:repeat(3,1fr);
  }
}

/* CURSOR */
#cursor{
  position:fixed;width:120px;height:120px;
  background:radial-gradient(circle,#3b82f655,transparent);
  border-radius:50%;pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}
</style>
</head>

<body>

<div id="cursor"></div>

<header>
  <img src="NVLME0005.JPG" class="glow-logo">
  <h2>Experience Innovation</h2>
  <button id="themeToggle">🌙</button>
</header>

<div class="icon-wrapper">
  <a href="index.html" class="icon-box">
    <h3>Home</h3>
    <p>Back to main page</p>
  </a>
  <a href="services.html" class="icon-box">
    <h3>Services</h3>
    <p>Web design & development</p>
  </a>
  <a href="contact.html" class="icon-box">
    <h3>Contact</h3>
    <p>Get in touch</p>
  </a>
  <a href="about.html" class="icon-box">
    <h3>About</h3>
    <p>Who we are</p>
  </a>
</div>

<section id="heroSlider">
  <div>
    <h1>Welcome to Our Website</h1>
    <p>Explore our amazing content and services.</p>
    <button onclick="window.location='contact.html'">Get Started</button>
  </div>
</section>

<!-- GALLERY -->
<div id="neonGallery" class="image-gallery">

  <div class="gallery-photo">
    <img src="design.jpg">
    <div class="caption">Landing Page Design</div>
  </div>

  <div class="gallery-photo">
    <img src="beau.jpg">
    <div class="caption">Portfolio Website</div>
  </div>

  <div class="gallery-photo">
    <img src="world.jpg">
    <div class="caption">E-commerce Design</div>
  </div>

</div>

<script>
// cursor
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// theme toggle
document.getElementById("themeToggle").onclick=()=>{
  document.body.classList.toggle("dark");
};
</script>

</body>
</html>
