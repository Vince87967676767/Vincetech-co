<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincetech</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif;}

body{
  background:linear-gradient(135deg,#ffe4e6,#dbeafe,#fff);
  color:#111;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  padding:20px 40px;
  gap:20px;
}

.glow-logo{
  width:140px;
  animation:glow 3s infinite;
}

@keyframes glow{
  50%{filter:drop-shadow(0 0 15px #3b82f6);}
}

#themeToggle{
  margin-left:auto;
  padding:8px 14px;
  border:none;
  border-radius:20px;
}

/* ICONS */
.icon-wrapper{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

.icon-box{
  background:rgba(255,255,255,0.6);
  padding:25px;
  border-radius:15px;
  text-align:center;
  text-decoration:none;
  color:inherit;
}

/* HERO */
#heroSlider{
  display:flex;
  flex-wrap:wrap;
  padding:50px 40px;
  gap:20px;
  align-items:center;
}

#sliderTitle{
  font-size:2.5rem;
  background:linear-gradient(90deg,#3b82f6,#9333ea);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#3b82f6;
  color:#fff;
}

/* GALLERY */
#neonGallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:30px;
}

.gallery-photo{
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.gallery-photo img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.caption{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 10px;
  border-radius:6px;
  font-size:13px;
}
</style>
</head>

<body>

<header>
  <img src="NVLME0005.JPG" class="glow-logo">
  <h2>Experience Innovation</h2>
  <button id="themeToggle">🌙</button>
</header>

<div class="icon-wrapper">
  <a class="icon-box" href="index.html">Home</a>
  <a class="icon-box" href="services.html">Services</a>
  <a class="icon-box" href="contact.html">Contact</a>
  <a class="icon-box" href="about.html">About</a>
</div>

<section id="heroSlider">
  <div>
    <h1 id="sliderTitle">Welcome</h1>
    <p>Explore our services</p>
    <button onclick="window.location='contact.html'">Get Started</button>
  </div>

  <img src="web1.jpg" style="width:100%;border-radius:12px;">
</section>

<div id="neonGallery">

  <div class="gallery-photo">
    <img src="design.jpg">
    <div class="caption">Landing Page Design</div>
  </div>

  <div class="gallery-photo">
    <img src="beau.jpg">
    <div class="caption">Portfolio Website</div>
  </div>

  <div class="gallery-photo">
    <img src="world.jpg">
    <div class="caption">E-commerce Design</div>
  </div>

</div>

<script>
const toggle=document.getElementById("themeToggle");
toggle.onclick=()=>document.body.classList.toggle("dark");
</script>

</body>
</html>
