<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincetech - Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif;}
html{scroll-behavior:smooth;}

body{
  background: linear-gradient(135deg,#ffe4e6,#dbeafe,#ffffff);
  color:#111;
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px 40px;
}
#themeToggle{
  margin-left:auto;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* ICON GRID (UNCHANGED DESIGN) */
.icon-wrapper{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:40px;
}
.icon-box{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:30px;
  text-align:center;
  text-decoration:none;
  color:inherit;
  transition:0.3s;
}
.icon-box:hover{
  transform:translateY(-10px);
}

/* HERO */
#heroSlider{
  display:flex;
  flex-wrap:wrap;
  padding:60px 40px;
  align-items:center;
  gap:30px;
}

/* =========================
   ✅FIXED GALLERY (FINAL)
========================= */

.image-gallery{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
  padding:40px;
}

.gallery-photo{
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.gallery-photo img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
}

/* CAPTION INSIDE IMAGE */
.gallery-photo .caption{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
  text-align:center;
  white-space:nowrap;
}

/* RESPONSIVE FIX (WORKS ALL DEVICES) */
@media (max-width: 768px){
  .image-gallery{
    grid-template-columns:1fr;
  }
}

@media (min-width: 769px) and (max-width: 1024px){
  .image-gallery{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media (min-width: 1025px){
  .image-gallery{
    grid-template-columns:repeat(3, 1fr);
  }
}

</style>
</head>

<body>

<header>
  <img src="NVLME0005.JPG" width="120">
  <h2>Experience Innovation</h2>
  <button id="themeToggle">🌙</button>
</header>

<!-- ICONS (UNCHANGED) -->
<div class="icon-wrapper">
  <a href="index.html" class="icon-box">
    <h3>Home</h3>
    <p>Back to main page</p>
  </a>

  <a href="services.html" class="icon-box">
    <h3>Services</h3>
    <p>Web design & development</p>
  </a>

  <a href="contact.html" class="icon-box">
    <h3>Contact</h3>
    <p>Get in touch</p>
  </a>

  <a href="about.html" class="icon-box">
    <h3>About</h3>
    <p>Who we are</p>
  </a>
</div>

<!-- HERO (UNCHANGED) -->
<section id="heroSlider">
  <div>
    <h1>Welcome to Our Website</h1>
    <p>Explore our amazing content and services.</p>
    <button onclick="window.location='contact.html'">Get Started</button>
  </div>
</section>

<!-- GALLERY -->
<div class="image-gallery">

  <div class="gallery-photo">
    <img src="design.jpg">
    <div class="caption">Landing Page Design</div>
  </div>

  <div class="gallery-photo">
    <img src="beau.jpg">
    <div class="caption">Portfolio Website</div>
  </div>

  <div class="gallery-photo">
    <img src="world.jpg">
    <div class="caption">E-commerce Design</div>
  </div>

</div>

</body>
</html>
