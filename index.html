<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincetech - Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif;}
html{scroll-behavior:smooth;}

body{
  background: linear-gradient(135deg,#ffe4e6,#dbeafe,#ffffff);
  color:#111;
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px 40px;
  position:relative;
}

#themeToggle{
  margin-left:auto;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* LOGO */
.glow-logo{
  width:140px;
  animation: glow 3s infinite;
}
@keyframes glow{50%{filter:drop-shadow(0 0 15px #3b82f6);}}

/* MENU ICON */
#menuToggle{
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* MOBILE MENU */
#mobileMenu{
  display:none;
  flex-direction:column;
  gap:10px;
  position:absolute;
  top:70px;
  right:20px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

#mobileMenu a{
  text-decoration:none;
  color:#111;
}

/* ICON GRID */
.icon-wrapper{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:40px;
}

.icon-box{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:30px;
  text-align:center;
  text-decoration:none;
  color:inherit;
}

/* HERO */
#heroSlider{
  display:flex;
  flex-wrap:wrap;
  padding:60px 40px;
  align-items:center;
  gap:30px;
}

#sliderTitle{
  font-size:3rem;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 28px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:#fff;
  cursor:pointer;
}

/* GALLERY */
.image-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:40px;
}

.gallery-photo img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CURSOR */
#cursor{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle,#3b82f655,transparent);
  border-radius:50%;
  pointer-events:none;
}

/* MOBILE */
@media (max-width:768px){

  header{
    flex-direction:column;
    padding:15px;
    text-align:center;
  }

  #menuToggle{
    display:block;
    margin-left:auto;
  }

  #mobileMenu{
    position:static;
    width:100%;
  }

  .glow-logo{
    width:100px;
  }

  .icon-wrapper{
    grid-template-columns:1fr;
    padding:15px;
  }

  #heroSlider{
    flex-direction:column;
    padding:20px;
    text-align:center;
  }

  #sliderTitle{
    font-size:1.6rem;
  }

  button{
    width:100%;
    max-width:260px;
  }

  .image-gallery{
    grid-template-columns:1fr;
    padding:15px;
  }
}

</style>
</head>

<body>

<div id="cursor"></div>

<header>
  <img src="NVLME0005.JPG" class="glow-logo" alt="Logo">
  <h2>Experience Innovation</h2>

  <div id="menuToggle"><i class="fa-solid fa-bars"></i></div>

  <button id="themeToggle">🌙</button>

  <nav id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
  </nav>
</header>

<div class="icon-wrapper">
  <a href="index.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-house"></i></div>
    <h3>Home</h3>
  </a>

  <a href="services.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-laptop-code"></i></div>
    <h3>Services</h3>
  </a>

  <a href="contact.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-envelope"></i></div>
    <h3>Contact</h3>
  </a>

  <a href="about.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-user"></i></div>
    <h3>About</h3>
  </a>
</div>

<section id="heroSlider">
  <div>
    <h1 id="sliderTitle">Welcome to Our Website</h1>
    <p>Explore our amazing content and services.</p>

    <button>Get Started</button>
  </div>

  <img src="web1.jpg">
</section>

<div class="image-gallery">
  <img src="design.jpg">
  <img src="beau.jpg">
  <img src="world.jpg">
</div>

<script>
const menuToggle=document.getElementById("menuToggle");
const mobileMenu=document.getElementById("mobileMenu");

menuToggle.onclick=()=>{
  mobileMenu.style.display=
  mobileMenu.style.display==="flex"?"none":"flex";
};

const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
