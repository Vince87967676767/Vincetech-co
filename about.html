<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCETECH.CO - Home</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif;}

/* Page background: soft pink, blue, and white gradient */
body{
  background: linear-gradient(135deg, #ffe4e6, #dbeafe, #ffffff);
  padding:40px;
}

/* Grid container */
.icon-wrapper{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* Glass-style card */
.icon-box{
  position: relative;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius:18px;
  text-align:center;
  text-decoration:none;
  color:#1f2937;
  padding:30px 20px;
  transition: all 0.4s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  overflow: hidden;
}

/* Continuous animated gradient overlay for card */
.icon-box::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background: linear-gradient(270deg, #f472b6, #9333ea, #3b82f6, #f43f5e);
  background-size: 600% 600%;
  opacity:0.12;
  border-radius:18px;
  z-index:0;
  animation: gradientShift 6s ease infinite;
}

/* Gradient animation keyframes */
@keyframes gradientShift {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Icon */
.icon{
  position: relative;
  z-index:1;
  width:65px;
  height:65px;
  margin:0 auto 15px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:26px;
  transition: transform 0.4s ease, filter 0.4s ease;
  background: linear-gradient(270deg, #f472b6, #9333ea, #3b82f6, #f43f5e);
  background-size: 600% 600%;
  animation: iconGlow 6s ease infinite, iconPulse 2.5s ease-in-out infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: brightness(1);
}

@keyframes iconGlow {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes iconPulse {
  0%, 100%{filter: brightness(1);}
  50%{filter: brightness(1.25);}
}

/* Text */
.icon-box h3{
  position: relative;
  z-index:1;
  margin-bottom:6px;
  font-size:18px;
}

.icon-box p{
  position: relative;
  z-index:1;
  font-size:14px;
  color:#4b5563;
}

/* Hover Effects */
.icon-box:hover{
  transform: translateY(-8px);
  box-shadow: 0 18px 35px rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.8);
}

.icon-box:hover .icon{
  transform: scale(1.25) rotate(8deg);
  filter: brightness(1.5);
}

/* ===== GET STARTED BUTTON STYLES ===== */
.get-started{
  margin: 40px auto;
  max-width: 250px;
}
.get-started .icon-box{
  text-align:center;
}
</style>
</head>
<body>

<div class="icon-wrapper">
  <a href="index.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-house"></i></div>
    <h3>Home</h3>
    <p>Back to main page</p>
  </a>

  <a href="services.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-laptop-code"></i></div>
    <h3>Services</h3>
    <p>Web design & development</p>
  </a>

  <a href="contact.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-envelope"></i></div>
    <h3>Contact</h3>
    <p>Get in touch</p>
  </a>

  <a href="about.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-user"></i></div>
    <h3>About</h3>
    <p>Who we are</p>
  </a>
</div>

<!-- GET STARTED BUTTON -->
<div class="get-started">
  <a href="contact.html" class="icon-box">
    <div class="icon"><i class="fa-solid fa-arrow-right"></i></div>
    <h3>Get Started</h3>
    <p>Start your project with us</p>
  </a>
</div>

</body>
</html>
