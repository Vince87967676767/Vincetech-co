<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact - Futuristic Neon Showcase</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }

/* Background */
body, html { height:100%; width:100%; overflow-x:hidden; background:#000; color:#fff; display:flex; flex-direction:column; align-items:center; padding-top:8vh; }
body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:-1; }

/* Particles */
#particles {
  position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden;
}
.particle { position:absolute; width:3px; height:3px; background: rgba(0,255,255,0.55); border-radius:50%; animation: float 6s linear infinite; }
@keyframes float{0%{transform:translateY(100vh) translateX(0) scale(1); opacity:0.4;}50%{opacity:0.7;}100%{transform:translateY(-10vh) translateX(50px) scale(0.5); opacity:0;}}

/* Icon grid */
.icon-wrapper { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:30px; width:90%; max-width:1200px; margin-bottom:50px; position:relative; z-index:1; }
.icon-box { position:relative; background:rgba(255,255,255,0); border-radius:18px; text-align:center; text-decoration:none; color:#fff; padding:30px 20px; transition: all 0.4s ease; overflow:visible; }
.icon-box::before { content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; border-radius:20px; border:1px solid rgba(0,255,255,0.25); box-shadow:0 0 8px rgba(0,255,255,0.5),0 0 16px rgba(0,255,255,0.3),0 0 24px rgba(0,255,255,0.2); z-index:0; animation: neonPulse 3s ease-in-out infinite alternate; }
@keyframes neonPulse {0% { box-shadow:0 0 4px rgba(0,255,255,0.3),0 0 8px rgba(0,255,255,0.2),0 0 12px rgba(0,255,255,0.1); } 100% { box-shadow:0 0 12px rgba(0,255,255,0.7),0 0 24px rgba(0,255,255,0.5),0 0 36px rgba(0,255,255,0.25); } }
.icon { position:relative; z-index:1; width:80px; height:80px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:34px; background:linear-gradient(270deg,#0ff,#0ff,#0ff,#0ff); background-size:600% 600%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation: iconGlow 6s ease infinite, iconPulse 3s ease-in-out infinite; }
@keyframes iconGlow {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes iconPulse {0%,100%{filter:brightness(1);}50%{filter:brightness(1.5);}}
.icon-box h3{ margin-bottom:6px; font-size:18px; }
.icon-box p{ font-size:14px; color:#e0ffff; z-index:1; position:relative; }
.icon-box:hover{ transform: translateY(-6px); }
.icon-box:hover .icon{ transform: scale(1.25) rotate(5deg); filter:brightness(1.7); }

/* Contact Form */
.contact-section{ width:90%; max-width:800px; margin-bottom:60px; text-align:center; z-index:1; }
.contact-section h2{ font-size:36px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; }
.contact-section p{ font-size:18px; margin-bottom:30px; opacity:0.9; }
.contact-form{ display:flex; flex-direction:column; gap:20px; }
.contact-form input, .contact-form textarea{ padding:15px; border-radius:12px; border:none; outline:none; font-size:16px; background:rgba(0,255,255,0.05); color:#fff; box-shadow:0 0 10px rgba(0,255,255,0.2);}
.contact-form input::placeholder, .contact-form textarea::placeholder{ color:#c0ffff; }
.contact-form button{ padding:15px 35px; border-radius:50px; border:2px solid #0ff; color:#0ff; font-size:18px; cursor:pointer; background:transparent; transition:all 0.3s ease;}
.contact-form button:hover{ background:#0ff; color:#000; box-shadow:0 0 20px #0ff,0 0 40px #0ff; transform:scale(1.05);}
</style>
</head>
<body>

<!-- Particles -->
<div id="particles"></div>

<!-- Neon Icon Boxes -->
<div class="icon-wrapper">
  <a href="index.html" class="icon-box"><div class="icon"><i class="fa-solid fa-house"></i></div><h3>Home</h3><p>Back to main page</p></a>
  <a href="services.html" class="icon-box"><div class="icon"><i class="fa-solid fa-laptop-code"></i></div><h3>Services</h3><p>Web design & development</p></a>
  <a href="contact.html" class="icon-box"><div class="icon"><i class="fa-solid fa-envelope"></i></div><h3>Contact</h3><p>Get in touch</p></a>
  <a href="about.html" class="icon-box"><div class="icon"><i class="fa-solid fa-user"></i></div><h3>About</h3><p>Who we are</p></a>
</div>

<!-- Contact Form Section -->
<div class="contact-section">
  <h2>Contact Us</h2>
  <p>Fill out the form below or email us directly at <a href="mailto:obiwuru010@gmail.com">obiwuru010@gmail.com</a></p>
  <form class="contact-form" action="mailto:obiwuru010@gmail.com" method="post" enctype="text/plain">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

</body>
<script>
// Generate particles
const particleContainer = document.getElementById('particles');
for(let i=0;i<80;i++){
  const p=document.createElement('div');
  p.classList.add('particle');
  p.style.left=Math.random()*100+'vw';
  p.style.animationDelay=Math.random()*6+'s';
  const size=2+Math.random()*4;
  p.style.width=size+'px';
  p.style.height=size+'px';
  particleContainer.appendChild(p);
}
</script>
</html>
